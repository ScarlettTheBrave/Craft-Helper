services:
  db:
    image: postgres:16-alpine
    container_name: albion_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: albion_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: albion_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: